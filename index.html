<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Terminale Schieramento - Helldivers XR</title>
    <script src="https://xri.onl/XRi.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style/main.css">
    <link rel="stylesheet" href="style/components.css">
    <link rel="stylesheet" href="style/debug.css">
    <script src="js/utils.js"></script>
</head>
<body>

<div class="loader-container">
    <h2 id="main-title">HELLDIVERS 2 XR</h2>
    <div class="progress-track">
        <div id="progress-bar" class="progress-fill"></div>
    </div>
    <div id="status-text">Connessione al Super Destroyer...</div>
</div>

<div id="vr-overlay" class="overlay">
    <div class="popup">
        <h3></h3>
        <p></p>
        <div class="popup-buttons">
            <button class="btn-no"></button>
            <button class="btn-yes"></button>
        </div>
    </div>
</div>

<div id="debug-overlay">
    <button class="debug-close-btn" onclick="document.getElementById('debug-overlay').style.display='none'">CHIUDI</button>
    <div id="debug-content" style="margin-top: 100px;"></div>
</div>

<script>
const params = getUrlParams();
log('debug mode: ' + params.debug);
const basePath = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' 
    ? '' 
    : '/XRi-helldivers-game/'; // <-- Aggiorna questo con il path del tuo repo se serve

const RAW_BASE = "https://raw.githubusercontent.com/simonevetere/XRi-helldivers-demo/main/assets/3d/";
const assetsToLoad = [
    { id: 'map_1', url: RAW_BASE + 'map.glb' },
    { id: 'boom_1', url: RAW_BASE + 'explosion.glb' },
    { id: 'helldiver_base', url: RAW_BASE + 'helldiver.glb' },
    { id: 'mothership_base', url: RAW_BASE + 'mothership.glb' },
    { id: 'terminide_base', url: RAW_BASE + 'harvester2.glb' }
];

function updateUI(percent, text) {
    document.getElementById('progress-bar').style.width = percent + "%";
    document.getElementById('status-text').innerText = text;
}

async function startPreload() {
    XRi.clearAll(); 
    const total = assetsToLoad.length;

    for (let i = 0; i < assetsToLoad.length; i++) {
        const asset = assetsToLoad[i];
        let assetBytes = 0;
        let assetSizeStr = "N/A";

        try {
            const res = await fetch(asset.url, { method: 'HEAD' });
            assetBytes = parseInt(res.headers.get('content-length') || 0);
            assetSizeStr = (assetBytes / (1024 * 1024)).toFixed(2) + " MB";
        } catch (e) { console.warn("Errore HEAD"); }

        let secondsCounter = 0;
        const monitorInterval = setInterval(() => {
            const currentMbps = navigator.connection?.downlink || 1; 
            const estimate = getDownloadEstimate(assetBytes, currentMbps, secondsCounter);
            
            updateUI(
                Math.round((i / total) * 100), 
                `Acquisizione ${asset.id}: ${estimate} - Vel: ${currentMbps}Mbps`
            );
            secondsCounter += 0.5;
        }, 500);

        try {
            // Spawna i modelli fuori visuale per metterli in cache
            current3d = await XRi.spawn(asset.id, asset.url, 0.1, { x: 0, y: -5, z: 0 });
            current3d.setVisible(false);
            current3d.setGrabbable(false);

            clearInterval(monitorInterval);
            log(`[OK] ${asset.id} (${assetSizeStr}) schierato`, "#00ffcc");
        } catch (err) {
            i = i - 1;
            clearInterval(monitorInterval);
            log(`[ERR] ${asset.id} fallito`, "#ff3333");
        }
    }

    updateUI(100, "COMPLETATO - Attesa Ordini...");

    if (!params["session"]) {
        log("Nessuna sessione attiva nell'URL", "#ffe800");
        
        mostraMessaggio(
            "RETE TATTICA", 
            "Vuoi avviare una nuova missione di schieramento o unirti a una squadra esistente?", 
            {
                textYes: "Avvia Missione",               
                actionYes: () => {
                    const newId = XRi.generateId().replace("id_", "");
                    const newParams = new URLSearchParams(window.location.search);
                    newParams.set("session", newId);
                    manageStorage('delete', 'local_player'); 
                    window.location.href = basePath + "playable/name.html?" + newParams.toString();
                },
                textNo: "Riconnetti / Unisciti",
                actionNo: () => {
                    window.location.href = basePath + "/reconnect.html" + window.location.search;
                }
            }
        );
    } else {
        window.location.href = basePath + "/reconnect.html" + window.location.search;
    }
}

function getDownloadEstimate(bytes, mbps, secondsElapsed) {
    if (!bytes || !mbps || mbps <= 0) return "Calcolo parametri...";
    const fileMb = (bytes * 8) / (1024 * 1024);
    const estimatedTotalSeconds = fileMb / mbps;
    let percent = Math.round((secondsElapsed / estimatedTotalSeconds) * 100);
    if (percent > 99) percent = 99;
    return `${percent}% (ETA: ${Math.max(0, Math.round(estimatedTotalSeconds - secondsElapsed))}s)`;
}

window.onload = () => {
    oldsessionplayer = getStorageData().local_player;
    manageStorage('clear');
    manageStorage('save', 'local_player', oldsessionplayer);

    let attempts = 0;
    const maxAttempts = 20;

    const checkReady = () => {
        if (window.XRi) {
            log("Inizializzazione Rete Multiplayer...", "#00ffcc");
            XRi.initMultiplayer();
        }

        if (XRi.isReady) {
            startPreload();
            document.getElementById('vr-overlay').style.display = 'none'; 
        } 
        else {
            attempts++;
            if (attempts < maxAttempts) {
                setTimeout(checkReady, 100);
            } 
            else {
                mostraMessaggio(
                    "SISTEMA XR NON RILEVATO", 
                    "Visore tattico assente. Eseguire forzatura del sistema?", 
                    {
                        textNo: "Nuova Scansione",
                        actionNo: () => { startPreload(); },
                        textYes: "Forza Avvio",
                        actionYes: () => { closePopup(); }
                    }
                );
            }
        }
    };
    checkReady();
};

function closePopup() {
    document.getElementById('vr-overlay').style.display = 'none';
    let agg = 0;

    function simulateDownload() {
        for (let i = 0; i < assetsToLoad.length; i++) {
            const asset = assetsToLoad[i];    
            manageStorage('save', `${asset.id}`, "true");
            manageStorage('save', `url_${asset.id}`, asset.url);
            log(`[OK] ${asset.id} pronto nel DB`, "#00ffcc");
        }

        if (agg <= 100) {
            updateUI(agg, "Bypass di sicurezza in corso...");
            agg += 1;
            if (agg <= 100) {
                setTimeout(simulateDownload, 15);
            } else {
                if (!params["session"]) {
                    log("Nessuna sessione attiva nell'URL", "#ffe800");
                    mostraMessaggio(
                        "RETE TATTICA", 
                        "Vuoi avviare una nuova missione o unirti a una squadra?", 
                        {
                            textYes: "Avvia Missione",
                            actionYes: () => {
                                const newId = XRi.generateId().replace("id_", "");
                                const newParams = new URLSearchParams(window.location.search);
                                newParams.set("session", newId);
                                manageStorage('delete', 'local_player'); 
                                window.location.href = basePath + "playable/name.html?" + newParams.toString();
                            },
                            textNo: "Riconnetti / Unisciti",
                            actionNo: () => {
                                window.location.href = basePath + "/reconnect.html" + window.location.search;
                            }
                        }
                    );
                } else {
                    window.location.href = basePath + "/reconnect.html" + window.location.search;
                }
            }
        }
    }
    simulateDownload();
}

window.onerror = function(message, source, lineno, colno, error) {
    const errorMsg = `[JS ERR] ${message} (riga ${lineno}:${colno})`;
    if (window.XRi) {
        window.XRi._broadcast(`window.XRi._safeLog("${errorMsg}", "#ff3333");`);
        window.XRi._safeLog(errorMsg, "#ff3333");
    }
    return false;
};
</script>
</body>
</html>
