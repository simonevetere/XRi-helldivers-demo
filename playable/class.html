<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Terminale Specializzazioni - Helldivers</title>
    <script src="https://xri.onl/XRi.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../style/main.css">
    <link rel="stylesheet" href="../style/components.css">
    <link rel="stylesheet" href="../style/debug.css">
    <script src="../js/utils.js"></script>
    <style>
        body {
            background-color: #050505;
            color: white;
            font-family: 'Share Tech Mono', monospace;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h2 {
            color: #ffe800;
            text-transform: uppercase;
            letter-spacing: 5px;
            text-shadow: 0 0 15px rgba(255, 232, 0, 0.4);
            font-size: 3rem;
            margin-top: 40px;
            text-align: center;
        }

        .species-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px; 
            margin-top: 20px;
            width: 90%;
            max-width: 1200px; 
        }

        .species-card {
            background: rgba(15, 15, 15, 0.9);
            backdrop-filter: blur(15px);
            border: 2px solid #444; 
            border-radius: 10px; 
            padding: 40px 30px; 
            cursor: pointer;
            transition: all 0.2s ease-out;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 150px;
            box-shadow: 0 0 15px rgba(0,0,0,0.8);
        }

        /* Feedback visivo tattico */
        .species-card:hover {
            border-color: #ffe800;
            background: rgba(255, 232, 0, 0.05);
            transform: scale(1.05); 
            box-shadow: inset 0 0 20px rgba(255, 232, 0, 0.1), 0 0 30px rgba(255, 232, 0, 0.3);
        }

        /* Feedback al "click" del trigger del controller */
        .species-card:active {
            transform: scale(0.98);
            background: rgba(255, 232, 0, 0.2);
        }

        .species-card h3 {
            margin: 0;
            font-size: 3.5rem; 
            color: #ffe800;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        .icon-placeholder {
            font-size: 4rem;
            margin: 15px 0;
            color: #fff;
        }

        .species-card p {
            margin: 10px 0 0;
            font-size: 1.5rem; 
            color: #00ffcc;
            text-align: center;
            line-height: 1.4;
        }

        /* Fix per visori con risoluzione minore o schermi stretti */
        @media (max-width: 1000px) {
            .species-grid {
                grid-template-columns: 1fr;
                gap: 20px;
            }
            .species-card {
                min-height: 150px;
                padding: 30px;
            }
        }
    </style>
</head>
<body>

<h2>Seleziona Specializzazione</h2>
<div class="species-grid">
    <div class="species-card" onclick="selectClass('Captain', 'Comando tattico, supporto orbitale e versatilità sul campo.')">
        <h3>CAPTAIN</h3>
        <img src="../assets/img/captain.png" alt="Captain" style="width: 80px; height: auto; margin: 15px 0;">
        <p>Comando tattico e versatilità sul campo.</p>
    </div>

    <div class="species-card" onclick="selectClass('Heavy', 'Potenza di fuoco soverchiante, armi pesanti e soppressione.')">
        <h3>HEAVY</h3>
        <img src="../assets/img/heavy.png" alt="Heavy" style="width: 80px; height: auto; margin: 15px 0;">
        <p>Potenza di fuoco soverchiante e armature pesanti.</p>
    </div>

    <div class="species-card" onclick="selectClass('Pyro', 'Controllo folla tramite danni incendiari e lanciafiamme.')">
        <h3>PYRO</h3>
        <img src="../assets/img/pyro.png" alt="Pyro" style="width: 80px; height: auto; margin: 15px 0;">
        <p>Controllo del campo tramite danni incendiari.</p>
    </div>

    <div class="species-card" onclick="selectClass('Sniper', 'Precisione letale, fucili di precisione e ingaggio a lungo raggio.')">
        <h3>SNIPER</h3>
        <img src="../assets/img/sniper.png" alt="Sniper" style="width: 80px; height: auto; margin: 15px 0;">
        <p>Precisione letale e ingaggio a lungo raggio.</p>
    </div>
</div>
<div id="vr-overlay" class="overlay">
    <div class="popup">
        <h3></h3>
        <p></p>
        <div class="popup-buttons">
            <button class="btn-no"></button>
            <button class="btn-yes"></button>
        </div>
    </div>
</div>

<div id="debug-overlay">
    <button class="debug-close-btn" onclick="document.getElementById('debug-overlay').style.display='none'">CHIUDI</button>
    <div id="debug-content" style="margin-top: 100px;"></div>
</div>

<script>
let selectedHeroId = null;
const heroInstances = {}; 
const params = getUrlParams();
const basePath = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' ? '' : '/XRi-helldivers-game/';

// Assicurati che questi 'id' corrispondano ai modelli 3D precaricati nel tuo loader!
const heroes = [
    { id: 'class_captain', name: 'Captain', desc: 'Comando tattico e versatilità.', x: -0.45 },
    { id: 'class_heavy', name: 'Heavy', desc: 'Potenza di fuoco soverchiante.', x: -0.15 },
    { id: 'class_pyro', name: 'Pyro', desc: 'Danni incendiari continui.', x: 0.15 },
    { id: 'class_sniper', name: 'Sniper', desc: 'Ingaggio a lungo raggio.', x: 0.45 }
];

/**
 * Gestisce il comportamento fisico dell'eroe quando viene selezionato
 */
async function handleSelection(heroId) {
    if (selectedHeroId && selectedHeroId !== heroId) {
        const oldHero = heroes.find(h => h.id === selectedHeroId);
        const oldInst = heroInstances[selectedHeroId];
        if (oldInst) {
            await oldInst.resetRotation(0.5); 
            await oldInst.setPosition({ x: oldHero.x, y: 1.1, z: 0.5 }, 0.5);
        }
    }

    selectedHeroId = heroId;
    const heroData = heroes.find(h => h.id === heroId);
    const chosen = heroInstances[heroId];

    if (!chosen) return;

    log(`Focus su equipaggiamento: ${heroData.name}`, "#ffe800");

    setTimeout(() => {
        selectClass(heroData.name, heroData.desc);
    }, 600);
}

window.handleSelection = handleSelection;

/**
 * Gestisce la conferma della Classe
 */
function selectClass(name, description) {
    mostraMessaggio(
        `CONFERMA ASSEGNAZIONE: ${name.toUpperCase()}`, 
        `${description}\n\nSelezionare questa specializzazione per lo schieramento?`, 
        {
            textYes: "CONFERMA",
            textNo: "ANNULLA",
            actionYes: async () => {
                const allData = getStorageData();
                const playerKey = `${allData.local_player}_class`;
                
                // Salvataggio nel DB locale e in rete
                manageStorage('save', playerKey, name);
                if(window.XRi) XRi._broadcast(`manageStorage('save', '${playerKey}', '${name}');`);

                // Animazione di focus sul modello scelto
                for (const h of heroes) {
                    const inst = heroInstances[h.id];
                    if (inst) {
                        if (h.id !== selectedHeroId && selectedHeroId !== null) {
                            await inst.setVisible(false);
                        } else if (h.id === selectedHeroId) {
                            await inst.resetRotation(0.2);
                            await inst.setPosition({ x: 0, y: 1.1, z: 0.2 }, 0.5);
                            await inst.zoom(1.2);
                        }
                    }
                }

                // Procedi alla fase successiva
                setTimeout(() => { avanti(); }, 1000);
            },
            actionNo: () => {
                const chosen = heroInstances[selectedHeroId];
                if (chosen) chosen.resetRotation(0.5);
                
                document.getElementById('vr-overlay').style.display = 'none';
            }
        }
    );
}

async function spawnAllHeroes() {
    for (const hero of heroes) {
        try {
            // Nota: Se i modelli non vengono trovati, la libreria lancerà un errore. 
            // Assicurati che gli ID in 'heroes' esistano!
            heroInstances[hero.id] = XRi.getClassById(hero.id);
            let current = heroInstances[hero.id];
            
            await current.setVisible(true);
            await current.setPosition({ x: hero.x, y: 1.1, z: 0.5 }, 0);
            await current.setGrabbable(true);
            current.resetRotation(0.5);
            current.startAnimation(""); 
        } catch(e) { 
            log(`Modello per ${hero.id} non trovato in cache.`, "#ff3333"); 
        }
    }
}

function avanti() {
     // Reindirizza alla plancia di gioco (cambia l'URL se la tua pagina si chiama diversamente)
     window.location.href = `${basePath}game.html${window.location.search}`;
}

window.onload = () => {
    const check = setInterval(() => {
        if (XRi && XRi.isReady) {
            clearInterval(check);
            spawnAllHeroes();
        }
    }, 200);
    
    if(window.XRi){
        XRi.initMultiplayer();
    }
};
</script>
</body>
</html>
